name: gitlab
version: 0.1.0
runtime: python
description: "GitLab merge requests, work items, and reviews"
categories: [task]
entrypoint:
  python:
    script: __main__.py
requirements: requirements.txt
config:
  - { key: base_url, label: "GitLab URL", required: true }
credentials:
  - { key: token, label: "Private Token", secret: true }
capabilities:
  network: ["*"]
  filesystem: []
render:
  custom: false
