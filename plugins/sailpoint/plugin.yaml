name: sailpoint
version: 0.2.0
runtime: python
description: "SailPoint IdentityNow access-request approvals and certifications"
icon: "data:image/svg+xml;base64,"
categories: [approval, task]
entrypoint:
  python:
    script: __main__.py
requirements: requirements.txt
config:
  - { key: base_url, label: "SailPoint portal URL", required: true }
credentials: []
capabilities:
  network: ["*.identitynow.com", "*.api.identitynow.com", "login.microsoftonline.com"]
  browser: true
  filesystem:
    - read: "~/.aide/plugins/sailpoint/sessions/"
    - write: "~/.aide/plugins/sailpoint/sessions/"
render:
  custom: false
