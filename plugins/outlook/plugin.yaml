name: outlook
version: 0.2.0
runtime: python
description: "Microsoft Outlook calendar events and unread inbox emails"
icon: "data:image/svg+xml;base64,"
categories: [event, metric, email]
entrypoint:
  python:
    script: __main__.py
requirements: requirements.txt
config:
  - { key: fetch_events, label: "Fetch calendar events (0 to disable)", required: false, default: "1", type: integer }
  - { key: calendar_days_ahead, label: "Days ahead to fetch", required: false, default: "7", type: integer }
  - { key: calendars, label: "Allowed calendar names", required: false, type: string_list }
  - { key: email_count, label: "Max unread emails to surface as items (0 = count only)", required: false, default: "0", type: integer }
  - { key: email_detail, label: "Email detail level: metadata | preview | full", required: false, default: "metadata", type: string }
credentials: []
capabilities:
  network: ["outlook.office.com", "outlook.cloud.microsoft", "login.microsoftonline.com", "login.live.com"]
  browser: true
  filesystem:
    - read: "~/.aide/plugins/outlook/sessions/"
    - write: "~/.aide/plugins/outlook/sessions/"
render:
  custom: true
