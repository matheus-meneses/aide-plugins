name: rh_management_portal
version: 1.0.0
runtime: python
description: "RH Management Portal - team absences, events, and tasks"
categories: [absence, event, task]
entrypoint:
  python:
    script: __main__.py
requirements: requirements.txt
config:
  - { key: base_url, label: "Management Portal URL", required: true }
credentials: []
capabilities:
  network: ["rhgestao.guardianrh.com.br", "login.microsoftonline.com"]
  browser: true
  filesystem:
    - read: "~/.aide/plugins/rh_management_portal/sessions/"
    - write: "~/.aide/plugins/rh_management_portal/sessions/"
render:
  custom: false
