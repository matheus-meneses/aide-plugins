name: Bug report
description: Report a problem with a data-source plugin (GitLab, Jira, Outlook, ...)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a plugin bug. Problems with the core CLI or agent itself belong in the
        [aide](https://github.com/matheus-meneses/aide/issues/new/choose) repository.
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      options:
        - gitlab
        - jira
        - outlook
        - other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. aide plugin install ...
        2. aide config source add ...
        3. aide run
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      description: From `aide plugin list`.
    validations:
      required: true
  - type: input
    id: aide_version
    attributes:
      label: aide version
      description: Output of `aide version`.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output from `aide -v run` (verbose). Rendered as code, so no backticks needed.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is a plugin/data-source bug, not a core CLI/agent bug.
          required: true
