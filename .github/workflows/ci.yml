name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
