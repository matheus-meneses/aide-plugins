name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.22"

      - name: Guard - tag matches plugin versions
        run: |
          CORE="${GITHUB_REF_NAME#v}"; CORE="${CORE%%-*}"
          fail=0
          for m in plugins/*/plugin.yaml; do
            v="$(awk '/^version:/{print $2; exit}' "$m")"
            [ "$v" = "$CORE" ] || { echo "::error::$m is $v, expected $CORE"; fail=1; }
          done
          [ "$fail" = 0 ]

      - name: Build registry and plugin artifacts
        env:
          REPO: ${{ github.repository }}
          ASSET_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: bash scripts/build-registry.sh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/index.yaml
            dist/*.tar.gz
            dist/*.plugin.yaml
